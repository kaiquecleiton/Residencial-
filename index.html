<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso Exclusivo - VIP</title>
    <!-- Fonte de alta conversão (Google Fonts) -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* CSS focado em conversão: Cores escuras e botões chamativos */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif;
        }

        body {
            background-color: #0a0a0a; /* Fundo preto puro para destacar botões */
            color: #ffffff;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 420px; /* Tamanho perfeito para telas de celular */
            text-align: center;
            margin-top: 40px;
        }

        /* Foto de Perfil */
        .profile-pic {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #ff0055; /* Borda rosa neon */
            box-shadow: 0 0 20px rgba(255, 0, 85, 0.4);
            margin-bottom: 20px;
        }

        /* Copy Aggressiva - Títulos */
        .headline {
            font-size: 22px;
            font-weight: 900;
            text-transform: uppercase;
            margin-bottom: 10px;
            line-height: 1.2;
        }

        .headline span {
            color: #ff0055; /* Destaque no gatilho mental */
        }

        .sub-headline {
            font-size: 14px;
            color: #aaaaaa;
            margin-bottom: 30px;
            font-weight: 400;
        }

        /* Botões de Conversão */
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            display: block;
            text-decoration: none;
            color: #ffffff;
            font-weight: 700;
            font-size: 16px;
            padding: 18px 20px;
            border-radius: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        /* O botão principal precisa "gritar" para ser clicado */
        .btn-vip {
            background: linear-gradient(45deg, #ff0055, #ff00aa);
            box-shadow: 0 5px 15px rgba(255, 0, 85, 0.4);
            animation: pulsar 2s infinite; /* Animação para chamar atenção */
        }

        .btn-vip:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(255, 0, 85, 0.6);
        }

        /* Botões secundários */
        .btn-secondary {
            background-color: #1a1a1a;
            border: 1px solid #333;
        }

        .btn-secondary:hover {
            background-color: #2a2a2a;
            border-color: #ff0055;
        }

        /* Animação do botão principal */
        @keyframes pulsar {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }

        /* Badges de prova social/urgência */
        .badge {
            background-color: #fff;
            color: #000;
            font-size: 11px;
            font-weight: 900;
            padding: 3px 8px;
            border-radius: 20px;
            position: absolute;
            top: -10px;
            right: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        .footer {
            margin-top: 40px;
            font-size: 12px;
            color: #555;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- COLOQUE O LINK DA SUA FOTO AQUI NO ATRIBUTO SRC -->
        <img src="https://via.placeholder.com/150" alt="Sua Foto" class="profile-pic">

        <!-- HEADLINE AGRESSIVA: Curiosidade + Exclusividade -->
        <h1 class="headline">O lado que o Instagram <span>não permite</span> você ver 😈</h1>
        
        <!-- SUB-HEADLINE: Escassez e Quebra de Objeção -->
        <p class="sub-headline">O que eu posto de graça é só 1%. Sem censura, chat liberado e atualizações diárias. Vagas limitadas.</p>

        <div class="links-container">
            
            <!-- BOTÃO PRINCIPAL: Ação imediata (Call to Action principal) -->
            <!-- COLOQUE SEU LINK DO PRIVACY/ONLYFANS NO ATRIBUTO HREF -->
            <a href="[SEU LINK DO PRIVACY OU ONLYFANS AQUI]" class="btn btn-vip">
                <span class="badge">🔥 RESTAM 3 VAGAS</span>
                Destravar VIP Agora
            </a>

            <!-- BOTÃO SECUNDÁRIO 1: Ticket Médio/Alto (Conteúdo Sob Medida) -->
            <!-- COLOQUE SEU LINK DO WHATSAPP AQUI -->
            <a href="[SEU LINK DO WHATSAPP AQUI]" class="btn btn-secondary">
                📲 Encomendar Vídeo Exclusivo
            </a>

            <!-- BOTÃO SECUNDÁRIO 2: Isca Digital (Para quem ainda está em dúvida) -->
            <!-- COLOQUE SEU LINK DO TELEGRAM GRÁTIS AQUI -->
            <a href="[SEU LINK DO GRUPO DO TELEGRAM AQUI]" class="btn btn-secondary">
                🎁 Prévias Grátis no Telegram
            </a>

        </div>

        <div class="footer">
            <p>🔞 Conteúdo restrito para maiores de 18 anos.</p>
        </div>
    </div>

</body>
</html>
