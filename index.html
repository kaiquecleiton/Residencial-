<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso Íntimo VIP</title>
    <!-- Fontes Premium: Playfair para elegância, Montserrat para leitura -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,700&family=Montserrat:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* Fundo com gradiente sensual: preto e vinho escuro */
            background: radial-gradient(circle at 50% 30%, #3a0011 0%, #050002 80%);
            color: #ffffff;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow: hidden;
            position: relative;
        }

        /* Efeito de fumaça/sombra no fundo para dar mistério */
        body::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.1;
            pointer-events: none;
        }

        .container {
            width: 100%;
            max-width: 400px;
            /* Efeito Glassmorphism (Vidro esfumaçado) */
            background: rgba(20, 0, 5, 0.4);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 51, 102, 0.2);
            border-radius: 20px;
            padding: 40px 30px;
            text-align: center;
            position: relative;
            z-index: 10;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(255, 51, 102, 0.05);
        }

        /* Ícone intimista */
        .icon-top {
            font-size: 35px;
            margin-bottom: 15px;
            filter: drop-shadow(0 0 10px rgba(255, 51, 102, 0.6));
        }

        /* Títulos e Textos */
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            font-weight: 600;
            font-style: italic;
            color: #ff3366; /* Rosa/Vermelho suave */
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .subtitle {
            font-size: 14px;
            color: #d1b3bb;
            font-weight: 300;
            line-height: 1.6;
            margin-bottom: 35px;
        }

        .highlight {
            font-weight: 700;
            color: #fff;
        }

        /* Botão Sedutor e Chamativo */
        .btn-vip {
            display: block;
            width: 100%;
            background: linear-gradient(135deg, #ff0044 0%, #990022 100%);
            color: #ffffff;
            text-decoration: none;
            font-size: 15px;
            font-weight: 700;
            padding: 20px;
            border-radius: 50px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(255, 0, 68, 0.4);
            position: relative;
            overflow: hidden;
        }

        .btn-vip:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(255, 0, 68, 0.6);
        }

        /* Efeito de brilho passando pelo botão */
        .btn-vip::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -60%;
            width: 20px;
            height: 200%;
            background: rgba(255,255,255,0.3);
            transform: rotate(35deg);
            transition: all 0.5s ease;
            animation: shine 3s infinite;
        }

        @keyframes shine {
            0% { left: -60%; }
            20% { left: 120%; }
            100% { left: 120%; }
        }

        /* Escassez elegante */
        .scarcity {
            margin-top: 25px;
            font-size: 12px;
            color: #a88;
        }

        .timer-box {
            display: inline-block;
            background: rgba(0,0,0,0.5);
            padding: 5px 12px;
            border-radius: 10px;
            margin-top: 8px;
            border: 1px solid rgba(255, 51, 102, 0.1);
        }

        .timer {
            font-family: 'Montserrat', sans-serif;
            font-size: 15px;
            font-weight: 700;
            color: #ff3366;
        }

        /* Cadeado sutil */
        .privacy-note {
            margin-top: 30px;
            font-size: 10px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="icon-top">🤫</div>
        
        <h1>O meu lado mais íntimo...</h1>
        
        <p class="subtitle">
            Você encontrou o meu esconderijo. Um lugar sem regras, sem censura do Instagram e <span class="highlight">estritamente confidencial</span>.<br><br>
            Acesse meu grupo privado no Telegram antes que as vagas se esgotem.
        </p>

        <!-- COLOQUE AQUI O SEU LINK DE CONVITE DO TELEGRAM -->
        <a href="[SEU LINK DO TELEGRAM AQUI]" class="btn-vip">
            🔥 Quero Ver Tudo
        </a>

        <div class="scarcity">
            Convite expira em: <br>
            <div class="timer-box">
                <span class="timer" id="countdown">03:59</span>
            </div>
        </div>

        <div class="privacy-note">
            🔒 100% Discreto & Anônimo
        </div>
    </div>

    <!-- Script para o Cronômetro -->
    <script>
        // Tempo de 4 minutos para gerar urgência natural
        let tempo = 239; 
        const elementoTimer = document.getElementById('countdown');

        const intervalo = setInterval(() => {
            const minutos = Math.floor(tempo / 60);
            let segundos = tempo % 60;

            segundos = segundos < 10 ? '0' + segundos : segundos;
            elementoTimer.innerHTML = `0${minutos}:${segundos}`;

            if (tempo > 0) {
                tempo--;
            } else {
                elementoTimer.innerHTML = "00:00";
                elementoTimer.style.color = "#666";
                clearInterval(intervalo);
            }
        }, 1000);
    </script>

</body>
</html>
